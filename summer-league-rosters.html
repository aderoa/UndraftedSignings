<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer League Rosters · HoopsMatic</title>
<!-- HoopsMatic · Summer League Rosters · v1.2 -->
<style>
  /* --- HoopsMatic Design System (light theme, DM Sans) --- */
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface-hover: #f0f0f2;
    --border: #d1d1d6;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-muted: #8e8e93;
    --accent: #b45309;
    --accent-hover: #92400e;
    --accent-light: rgba(180, 83, 9, 0.08);
    --green: #16a34a;
    --purple: #7c3aed;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    overflow-x: clip;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* Header */
  header {
    margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
  }
  h1 { font-size: 1.5rem; margin: 0 0 0.25rem; font-weight: 700; }
  .subtitle { color: var(--text-secondary); font-size: 0.9rem; margin: 0; }

  /* Action bar */
  .actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.55rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
  .btn:hover { background: var(--surface-hover); border-color: var(--text-muted); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-success { background: var(--green) !important; color: #fff !important; border-color: var(--green) !important; }

  .meta {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }

  /* Loading + empty states */
  .state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.95rem; }
  .state.error { color: #b91c1c; }

  /* Team sections */
  .team-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .team-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    background: var(--accent-light);
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: 0.95rem;
  }
  .team-name { color: var(--accent); }
  .team-header .team-count { margin-left: auto; }
  .team-count {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--surface);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .player-list { padding: 0.5rem 0; }
  .player-row {
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    border-top: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .player-row:first-child { border-top: none; }
  .player-name { flex: 1; }
  .player-bio { color: var(--text-muted); font-size: 0.78rem; }
  .player-flag { display: inline-block; width: 1.5rem; text-align: center; font-size: 1.05rem; margin-right: 0.4rem; flex: 0 0 auto; }
  .player-flag-empty { font-size: 1rem; }

  /* Footer summary */
  .summary {
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .summary strong { color: var(--text); font-weight: 700; }

  @media (max-width: 600px) {
    h1 { font-size: 1.25rem; }
    .container { padding: 1rem 0.75rem 3rem; }
    .meta { width: 100%; margin-left: 0; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Summer League Rosters</h1>
    <p class="subtitle">NBA Summer League squads · grouped by team, then by player last name</p>
  </header>

  <div class="actions">
    <button class="btn btn-primary" id="btnCopyPresto">📷 Copy Presto Code</button>
    <button class="btn" id="btnRefresh">↻ Refresh</button>
    <span class="meta" id="metaInfo">Loading…</span>
  </div>

  <div id="content">
    <div class="state">Loading rosters…</div>
  </div>
</div>

<script>
  // ============================================================
  // Summer League Rosters — v1.2
  // ============================================================
  // Roster source: Sheet10 (gid 326032081), served via /api/rm-undrafted.
  //   - Left block  (cols 0-2): the original undrafted-signings list.
  //   - Right block (cols 8-10): the additional Summer League players.
  //   We read NAME + TEAM from both blocks and ignore the contract/status
  //   columns (no 2W / E10 / SL / TWO-WAY / DRAFTED badges on this page).
  //
  // Bio source: Sheet2 (gid 1889032294), served via /api/rm-sl-bio. The Worker
  //   exposes only the bio slice Sheet2!S:AG, so the served CSV is re-indexed
  //   from S=0 (see COL_BIO_* below). Matched to the roster by normalized name.
  //   The bio fetch is best-effort: if it fails, names still render.
  const ROSTER_URL = 'https://hoopsmatic.com/api/rm-undrafted';
  const BIO_URL    = 'https://hoopsmatic.com/api/rm-sl-bio';   // Sheet2!S:AG

  // Sheet10 roster columns (0-based, NO header row)
  const COL_L_NAME = 0;   // left block: player
  const COL_L_TEAM = 1;   // left block: team (full short name, e.g. "LA Lakers")
  const COL_R_NAME = 8;   // right block: player
  const COL_R_TEAM = 10;  // right block: team

  // Bio columns — 0-based within the Sheet2!S:AG slice the Worker serves
  // (S=0). Source-sheet letters shown for reference.
  const COL_BIO_NAME     = 0;   // S  — PLAYER
  const COL_BIO_COUNTRY  = 4;   // W  — COUNTRY (reserved for future flags)
  const COL_BIO_AGE      = 8;   // AA — "X years and Y days"
  const COL_BIO_SCHOOL   = 10;  // AC — school / pre-draft team
  const COL_BIO_POSITION = 14;  // AG — position

  // ============================================================
  // Nationality flags (country string as it appears in COUNTRY col → emoji)
  // ============================================================
  const FLAGS = {
    'United States': '🇺🇸', 'USA': '🇺🇸', 'United States of America': '🇺🇸',
    'Australia': '🇦🇺', 'Canada': '🇨🇦', 'Germany': '🇩🇪', 'Puerto Rico': '🇵🇷',
    'Nigeria': '🇳🇬', 'Netherlands': '🇳🇱', 'Mali': '🇲🇱', 'Italy': '🇮🇹',
    'Spain': '🇪🇸', 'New Zealand': '🇳🇿', 'South Korea': '🇰🇷', 'Korea': '🇰🇷',
    'Estonia': '🇪🇪', 'United Kingdom': '🇬🇧', 'UK': '🇬🇧', 'Great Britain': '🇬🇧',
    'Mongolia': '🇲🇳', 'Russia': '🇷🇺', 'Dominican Republic': '🇩🇴', 'Mexico': '🇲🇽',
    'Trinidad and Tobago': '🇹🇹', 'Israel': '🇮🇱',
    // common NBA nationalities (buffer for future signings)
    'France': '🇫🇷', 'Serbia': '🇷🇸', 'Slovenia': '🇸🇮', 'Greece': '🇬🇷',
    'Croatia': '🇭🇷', 'Lithuania': '🇱🇹', 'Latvia': '🇱🇻', 'Turkey': '🇹🇷',
    'Cameroon': '🇨🇲', 'Senegal': '🇸🇳', 'DR Congo': '🇨🇩', 'Democratic Republic of the Congo': '🇨🇩',
    'Brazil': '🇧🇷', 'Argentina': '🇦🇷', 'Venezuela': '🇻🇪', 'Bahamas': '🇧🇸',
    'Japan': '🇯🇵', 'China': '🇨🇳', 'Philippines': '🇵🇭', 'Georgia': '🇬🇪',
    'Ukraine': '🇺🇦', 'Montenegro': '🇲🇪', 'Bosnia and Herzegovina': '🇧🇦',
    'Czech Republic': '🇨🇿', 'Poland': '🇵🇱', 'Finland': '🇫🇮', 'Sweden': '🇸🇪',
    'Switzerland': '🇨🇭', 'Austria': '🇦🇹', 'Belgium': '🇧🇪', 'Portugal': '🇵🇹',
    'Ireland': '🇮🇪', 'Egypt': '🇪🇬', 'South Sudan': '🇸🇸', 'Sudan': '🇸🇩',
    'Angola': '🇦🇴', 'Guinea': '🇬🇳', 'Ivory Coast': '🇨🇮', "Cote d'Ivoire": '🇨🇮',
    'Cape Verde': '🇨🇻', 'Jamaica': '🇯🇲', 'Tanzania': '🇹🇿', 'India': '🇮🇳',
    'Colombia': '🇨🇴', 'Panama': '🇵🇦', 'Slovakia': '🇸🇰', 'Romania': '🇷🇴',
  };
  function flagFor(country) {
    const c = (country || '').trim();
    return FLAGS[c] || '';
  }

  // ============================================================
  // CSV parsing — handles quoted fields with embedded commas
  // ============================================================
  function parseCSV(text) {
    const rows = [];
    let cur = [''], inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQ) {
        if (c === '"' && text[i + 1] === '"') { cur[cur.length - 1] += '"'; i++; }
        else if (c === '"') inQ = false;
        else cur[cur.length - 1] += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ',') cur.push('');
        else if (c === '\n') { rows.push(cur); cur = ['']; }
        else if (c !== '\r') cur[cur.length - 1] += c;
      }
    }
    if (cur.length > 1 || cur[0]) rows.push(cur);
    return rows;
  }

  // ============================================================
  // State
  // ============================================================
  let rosterByTeam = {};   // { teamName: [ { name, position, school, age } ] }
  let totalPlayers = 0;
  let totalTeams = 0;
  let lastFetchTime = null;

  function lastName(n) {
    const parts = String(n || '').trim().split(/\s+/);
    return parts[parts.length - 1] || String(n || '');
  }
  function normName(n) {
    return String(n || '')
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/\./g, '')
      .replace(/\b(jr|sr|ii|iii|iv|v)\b/gi, '')
      .replace(/\s+/g, ' ').trim().toLowerCase();
  }

  // ============================================================
  // Fetch
  // ============================================================
  async function fetchRosters(forceRefresh) {
    const meta = document.getElementById('metaInfo');
    const bust = forceRefresh ? '?nocache=1' : '';
    const opts = forceRefresh ? { cache: 'no-store' } : {};

    // 1) Roster (required)
    let rRows;
    try {
      const rResp = await fetch(ROSTER_URL + bust, opts);
      rRows = parseCSV(await rResp.text());
    } catch (e) {
      console.error('[SL] roster fetch failed:', e);
      document.getElementById('content').innerHTML =
        `<div class="state error">Failed to load rosters: ${escapeHTML(e.message || String(e))}</div>`;
      meta.textContent = 'Error';
      return;
    }

    // 2) Bios (best-effort — page still renders if this fails)
    let bioByName = {};
    try {
      const bResp = await fetch(BIO_URL + bust, opts);
      const bRows = parseCSV(await bResp.text());
      for (let i = 1; i < bRows.length; i++) {
        const nm = (bRows[i][COL_BIO_NAME] || '').trim();
        if (!nm) continue;
        bioByName[normName(nm)] = {
          position: (bRows[i][COL_BIO_POSITION] || '').trim(),
          school:   (bRows[i][COL_BIO_SCHOOL]   || '').trim(),
          age:      (bRows[i][COL_BIO_AGE]       || '').trim(),
          country:  (bRows[i][COL_BIO_COUNTRY]   || '').trim(),
        };
      }
    } catch (e) {
      console.warn('[SL] bio fetch failed (rendering names only):', e);
    }

    // 3) Build the combined roster from BOTH blocks of Sheet10.
    rosterByTeam = {};
    totalPlayers = 0;
    const seen = new Set();   // dedupe by normalized name + team

    function addPlayer(name, team) {
      name = (name || '').trim();
      team = (team || '').trim();
      if (!name || !team) return;
      const low = name.toLowerCase();
      if (low === 'player' || low === 'name') return; // guard a stray header
      const key = normName(name) + '|' + team.toLowerCase();
      if (seen.has(key)) return;
      seen.add(key);
      const bio = bioByName[normName(name)] || {};
      if (!rosterByTeam[team]) rosterByTeam[team] = [];
      rosterByTeam[team].push({ name, position: bio.position || '', school: bio.school || '', age: bio.age || '', country: bio.country || '' });
      totalPlayers++;
    }

    for (let i = 0; i < rRows.length; i++) {
      addPlayer(rRows[i][COL_L_NAME], rRows[i][COL_L_TEAM]); // left block
      addPlayer(rRows[i][COL_R_NAME], rRows[i][COL_R_TEAM]); // right block
    }

    for (const t of Object.keys(rosterByTeam)) {
      rosterByTeam[t].sort((a, b) => lastName(a.name).localeCompare(lastName(b.name)));
    }
    totalTeams = Object.keys(rosterByTeam).length;
    lastFetchTime = new Date();
    render();
  }

  // ============================================================
  // Render
  // ============================================================
  function render() {
    const meta = document.getElementById('metaInfo');
    meta.textContent = `${totalPlayers} player${totalPlayers === 1 ? '' : 's'} · ${totalTeams} teams · updated ${lastFetchTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

    if (totalPlayers === 0) {
      document.getElementById('content').innerHTML =
        '<div class="state">No Summer League players yet. Add rows to Sheet10 (player, team).</div>';
      return;
    }

    const teamNames = Object.keys(rosterByTeam).sort();
    let html = '';
    for (const team of teamNames) {
      const players = rosterByTeam[team];
      html += `<section class="team-section">
        <header class="team-header">
          <span class="team-name">${escapeHTML(team)}</span>
          <span class="team-count">${players.length} player${players.length === 1 ? '' : 's'}</span>
        </header>
        <div class="player-list">`;
      for (const p of players) {
        const subtitle = [p.position, p.school, p.age].filter(Boolean).join(' · ');
        const flag = flagFor(p.country);
        html += `<div class="player-row">
          ${flag ? `<span class="player-flag" title="${escapeHTML(p.country)}">${flag}</span>` : '<span class="player-flag player-flag-empty"></span>'}
          <span class="player-name"><strong>${escapeHTML(p.name)}</strong>${subtitle ? ` <span class="player-bio">— ${escapeHTML(subtitle)}</span>` : ''}</span>
        </div>`;
      }
      html += `</div></section>`;
    }

    html += `<div class="summary"><strong>${totalPlayers}</strong> players across <strong>${totalTeams}</strong> Summer League rosters.</div>`;
    document.getElementById('content').innerHTML = html;
  }

  function escapeHTML(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ============================================================
  // Presto code generation — plain, copy-pastable structure
  // ============================================================
  function generatePresto() {
    const teamNames = Object.keys(rosterByTeam).sort();
    if (!teamNames.length) return '';

    let out = '<div class="sl-wrap" style="font-family:sans-serif;max-width:700px;margin:0 auto">\n';
    out += '  <p style="margin:0 0 1em">A team-by-team look at the NBA Summer League rosters.</p>\n';

    for (const team of teamNames) {
      const players = rosterByTeam[team];
      out += `  <h3 style="margin:1.2em 0 .3em;font-size:1.1em;border-bottom:2px solid #b45309;padding-bottom:.15em">${escapeHTML(team)}</h3>\n`;
      out += `  <ul style="list-style:none;margin:.2em 0 .8em 0;padding:0">\n`;
      for (const p of players) {
        const subtitle = [p.position, p.school, p.age].filter(Boolean).join(', ');
        const flag = flagFor(p.country);
        out += `    <li style="margin:.15em 0">${flag ? flag + '\u00A0\u00A0' : ''}${escapeHTML(p.name)}`;
        if (subtitle) out += ` <span style="color:#666;font-size:.9em">(${escapeHTML(subtitle)})</span>`;
        out += `</li>\n`;
      }
      out += `  </ul>\n`;
    }
    out += '</div>';
    return out;
  }

  function copyPresto() {
    const code = generatePresto();
    const btn = document.getElementById('btnCopyPresto');
    if (!code) { flashButton(btn, 'Nothing to copy', false); return; }
    const blob = new Blob([code], { type: 'text/plain' });
    if (navigator.clipboard && navigator.clipboard.write) {
      navigator.clipboard.write([new ClipboardItem({ 'text/plain': blob })])
        .then(() => flashButton(btn, '✓ Copied!', true))
        .catch(() => fallbackCopy(code, btn));
    } else {
      fallbackCopy(code, btn);
    }
  }

  function fallbackCopy(text, btn) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); flashButton(btn, '✓ Copied!', true); }
    catch (e) { flashButton(btn, 'Copy failed', false); }
    document.body.removeChild(ta);
  }

  function flashButton(btn, msg, success) {
    btn.textContent = msg;
    if (success) btn.classList.add('btn-success');
    setTimeout(() => { btn.textContent = '📷 Copy Presto Code'; btn.classList.remove('btn-success'); }, 2000);
  }

  // ============================================================
  // Wire up + boot
  // ============================================================
  document.getElementById('btnCopyPresto').addEventListener('click', copyPresto);
  document.getElementById('btnRefresh').addEventListener('click', () => fetchRosters(true));

  fetchRosters(false);
</script>
</body>
</html>
